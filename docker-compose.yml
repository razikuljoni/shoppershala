version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: shoppershala-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: crud-express
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
